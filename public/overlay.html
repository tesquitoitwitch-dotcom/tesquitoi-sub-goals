<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sub Goals Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #eafdff;
    width: 640px;
    padding: 10px;
  }
  .panel {
    background: linear-gradient(135deg, #071b1e 0%, #0a2226 100%);
    border: 2px solid #4de3ea;
    border-radius: 10px;
    box-shadow: 0 0 24px rgba(77,227,234,0.35), 0 6px 20px rgba(0,0,0,0.6);
    padding: 16px 22px;
    position: relative;
    overflow: hidden;
  }
  .streak {
    position: absolute;
    height: 3px;
    background: rgba(255,255,255,0.5);
    border-radius: 3px;
    filter: blur(0.5px);
  }
  .s1 { width: 140px; top: 10px; right: -20px; transform: rotate(-18deg); }
  .s2 { width: 90px; bottom: 14px; left: -10px; transform: rotate(-18deg); }

  .title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #ffffff;
    text-align: center;
    text-shadow: 0 0 10px rgba(77,227,234,0.7);
  }
  .tagline {
    text-align: center;
    font-size: 12.5px;
    font-weight: 700;
    color: #ffd76a;
    margin-top: 4px;
    text-shadow: 0 0 8px rgba(255,215,106,0.5);
  }
  .startdate {
    text-align: center;
    font-size: 11px;
    color: #8fd9de;
    margin-top: 3px;
    margin-bottom: 20px;
  }
  .track-wrap { margin: 0 4px 30px 4px; position: relative; }
  .track {
    position: relative;
    height: 20px;
    background: #041012;
    border: 1px solid #2a4d50;
    border-radius: 10px;
    margin: 4px 12px 4px 12px;
  }
  .fill {
    position: absolute;
    top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, #0fa8b3, #4de3ea, #b6fbff);
    border-radius: 10px;
    box-shadow: 0 0 14px rgba(77,227,234,0.8);
    transition: width 0.8s ease;
  }
  .pip {
    position: absolute;
    top: 2px;
    width: 16px;
    height: 16px;
    margin-left: -8px;
    border-radius: 50%;
    background: #0a2226;
    border: 2px solid #2a4d50;
    z-index: 2;
  }
  .pip.reached {
    background: #4de3ea;
    border-color: #ffffff;
    box-shadow: 0 0 10px rgba(77,227,234,0.9);
  }
  .pip-label {
    position: absolute;
    top: 24px;
    font-size: 10px;
    font-weight: 700;
    color: #6fb8bd;
    margin-left: -14px;
    width: 28px;
    text-align: center;
  }
  .pip-label.reached { color: #ffffff; }
  .count {
    text-align: center;
    font-size: 14px;
    color: #cdf6f8;
    margin-bottom: 16px;
  }
  .count b { color: #ffffff; font-size: 16px; }
  .next-goal {
    border-top: 1px solid rgba(77,227,234,0.3);
    padding-top: 12px;
    text-align: center;
  }
  .next-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #8fd9de;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .next-seuil {
    font-size: 22px;
    font-weight: 800;
    color: #4de3ea;
    text-shadow: 0 0 12px rgba(77,227,234,0.7);
  }
  .next-lot {
    font-size: 15px;
    color: #ffffff;
    margin-top: 3px;
    font-weight: 600;
  }
  .all-done {
    font-size: 16px;
    font-weight: 800;
    color: #4de3ea;
  }
  .winners {
    margin-top: 12px;
    font-size: 11.5px;
    color: #a9e8ec;
    text-align: center;
    line-height: 1.6;
  }
  .winners b { color: #ffffff; }
</style>
</head>
<body>
  <div class="panel">
    <div class="streak s1"></div>
    <div class="streak s2"></div>
    <div class="title">🎯 OBJECTIF ABONNÉS</div>
    <div class="tagline">🎁 Chaque abonnement (même offert) = une chance de gagner !</div>
    <div class="startdate" id="startDate">Depuis le --/--/----</div>

    <div class="track-wrap">
      <div class="track" id="track">
        <div class="fill" id="fill"></div>
      </div>
    </div>
    <div class="count" id="progressCount"><b>0</b> / 200 nouveaux abonnés</div>

    <div class="next-goal" id="nextGoal"></div>
    <div class="winners" id="winnersList"></div>
  </div>

  <script>
    const FINAL_SEUIL = 200;

    function formatDate(iso) {
      const d = new Date(iso.replace(" ", "T") + "Z");
      return d.toLocaleDateString("fr-BE", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    async function refresh() {
      try {
        const res = await fetch("/api/paliers");
        const { campagne, paliers } = await res.json();
        const gagnes = Math.max(0, campagne.total_abonnes_actuel - campagne.total_abonnes_debut);

        document.getElementById("startDate").textContent = "Depuis le " + formatDate(campagne.date_debut);

        const pct = Math.min(100, (gagnes / FINAL_SEUIL) * 100);
        document.getElementById("fill").style.width = pct + "%";
        document.getElementById("progressCount").innerHTML = `<b>${gagnes}</b> / ${FINAL_SEUIL} nouveaux abonnés`;

        const track = document.getElementById("track");
        track.querySelectorAll(".pip, .pip-label").forEach(el => el.remove());
        paliers.forEach(p => {
          const posPct = Math.min(100, (p.seuil_abonnes / FINAL_SEUIL) * 100);

          const pip = document.createElement("div");
          pip.className = "pip" + (p.atteint ? " reached" : "");
          pip.style.left = posPct + "%";
          track.appendChild(pip);

          const label = document.createElement("div");
          label.className = "pip-label" + (p.atteint ? " reached" : "");
          label.style.left = posPct + "%";
          label.textContent = p.seuil_abonnes;
          track.appendChild(label);
        });

        const next = paliers.find(p => !p.atteint);
        const nextGoalEl = document.getElementById("nextGoal");
        if (next) {
          const restant = Math.max(0, next.seuil_abonnes - gagnes);
          nextGoalEl.innerHTML = `
            <div class="next-label">PROCHAIN PALIER — ${restant} ABONNÉ${restant > 1 ? "S" : ""} RESTANT${restant > 1 ? "S" : ""}</div>
            <div class="next-seuil">${next.seuil_abonnes} abonnés</div>
            <div class="next-lot">${next.lot_description}</div>
          `;
        } else {
          nextGoalEl.innerHTML = `<div class="all-done">🏆 Tous les paliers sont atteints !</div>`;
        }

        const winners = paliers.filter(p => p.gagnant);
        const winnersEl = document.getElementById("winnersList");
        winnersEl.innerHTML = winners.length
          ? winners.map(p => `Palier ${p.ordre} : <b>${p.gagnant}</b>`).join(" &nbsp;•&nbsp; ")
          : "";
      } catch (e) {
        console.error("Erreur refresh overlay:", e);
      }
    }

    refresh();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
