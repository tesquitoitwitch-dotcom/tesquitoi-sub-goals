<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sub Goals Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    width: 900px;
    padding: 20px;
  }
  .panel {
    background: rgba(10, 8, 20, 0.82);
    border: 2px solid #9147ff;
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .subtitle {
    font-size: 13px;
    color: #b9a3ff;
  }
  .track {
    position: relative;
    height: 10px;
    background: rgba(255,255,255,0.12);
    border-radius: 6px;
    margin: 30px 6px 46px 6px;
  }
  .fill {
    position: absolute;
    top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, #9147ff, #ff5ec4);
    border-radius: 6px;
    transition: width 0.6s ease;
  }
  .marker {
    position: absolute;
    top: -8px;
    width: 26px;
    height: 26px;
    margin-left: -13px;
    border-radius: 50%;
    background: #2a1f45;
    border: 3px solid #9147ff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }
  .marker.reached {
    background: #9147ff;
    border-color: #ff5ec4;
  }
  .marker-label {
    position: absolute;
    top: 22px;
    width: 130px;
    margin-left: -65px;
    text-align: center;
    font-size: 11px;
    line-height: 1.35;
  }
  .marker-seuil { font-weight: 700; color: #fff; }
  .marker-lot { color: #cbb9ff; font-size: 10.5px; }
  .marker-winner {
    color: #ffd76a;
    font-weight: 700;
    font-size: 11px;
    margin-top: 2px;
  }
  .count {
    font-size: 15px;
    color: #fff;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="title">🎯 Objectif Abonnés</div>
      <div class="subtitle" id="startDate">Campagne depuis le --/--/----</div>
    </div>
    <div class="header">
      <div class="count" id="progressCount">0 / 200 nouveaux abonnés</div>
    </div>
    <div class="track" id="track">
      <div class="fill" id="fill"></div>
    </div>
  </div>

  <script>
    const FINAL_SEUIL = 200;

    function formatDate(iso) {
      const d = new Date(iso.replace(" ", "T") + "Z");
      return d.toLocaleDateString("fr-BE", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    async function refresh() {
      try {
        const res = await fetch("/api/paliers");
        const { campagne, paliers } = await res.json();
        const gagnes = Math.max(0, campagne.total_abonnes_actuel - campagne.total_abonnes_debut);

        document.getElementById("startDate").textContent =
          "Campagne depuis le " + formatDate(campagne.date_debut);
        document.getElementById("progressCount").textContent =
          `${gagnes} / ${FINAL_SEUIL} nouveaux abonnés`;

        const pct = Math.min(100, (gagnes / FINAL_SEUIL) * 100);
        document.getElementById("fill").style.width = pct + "%";

        const track = document.getElementById("track");
        track.querySelectorAll(".marker, .marker-label").forEach(el => el.remove());

        paliers.forEach(p => {
          const posPct = Math.min(100, (p.seuil_abonnes / FINAL_SEUIL) * 100);

          const marker = document.createElement("div");
          marker.className = "marker" + (p.atteint ? " reached" : "");
          marker.style.left = posPct + "%";
          marker.textContent = p.ordre;
          track.appendChild(marker);

          const label = document.createElement("div");
          label.className = "marker-label";
          label.style.left = posPct + "%";
          label.innerHTML = `
            <div class="marker-seuil">${p.seuil_abonnes}</div>
            <div class="marker-lot">${p.lot_description}</div>
            ${p.gagnant ? `<div class="marker-winner">🏆 ${p.gagnant}</div>` : ""}
          `;
          track.appendChild(label);
        });
      } catch (e) {
        console.error("Erreur refresh overlay:", e);
      }
    }

    refresh();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
